      <section class="article-hero"><p class="eyebrow">Parent Child</p><h1>Amazon 父子体关系错误怎么修</h1><p class="lead">父子体错误通常会导致整个变体组失败。先确认结构，再处理标题、图片和卖点。</p></section>
      <section class="article-card"><h2>父体行检查</h2><ul><li><code>parentage</code> 为 parent。</li><li>不填写库存、价格和商品编码。</li><li>填写统一标题、品牌和 variation_theme。</li></ul></section>
      <section class="article-card"><h2>子体行检查</h2><ul><li><code>parentage</code> 为 child。</li><li><code>parent_sku</code> 指向父体 SKU。</li><li>填写价格、库存、商品编码和变体属性。</li></ul><div class="article-cta"><a class="primary-link" href="./index.html">上传报告自动诊断</a></div></section>
